services:
  - type: web
    name: recipe-site
    env: node
    branch: main
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: TELEGRAM_BOT_TOKEN
        value: "<твій бот токен>"
      - key: TELEGRAM_CHAT_ID
        value: "@footvotl_bot"
