services:
  - type: web
    name: recipe-site
    env: node
    branch: main
    buildCommand: npm install
    startCommand: npm start
    nodeVersion: 20
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: TELEGRAM_BOT_TOKEN
        value: "<твій бот токен>"
      - key: TELEGRAM_CHAT_ID
        value: "@food_volt"
